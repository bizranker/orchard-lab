name: java-demo-ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-java-demo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-demo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build
        run: mvn -B clean package

      - name: Archive JAR
        uses: actions/upload-artifact@v4
        with:
          name: orchard-lab-demo-jar
          path: java-demo/target/*.jar
