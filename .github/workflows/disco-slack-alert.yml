name: Disco Slack Alert

on:
  push:
    branches:
      - main

jobs:
  slack-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Send Slack alert
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO_NAME: ${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          ACTOR_NAME: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
          UTC_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          cat > payload.json <<EOF
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "Orchard Lab Disco Deploy Alert",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Repository:* \`${REPO_NAME}\`\n*Branch:* \`${BRANCH_NAME}\`\n*Actor:* \`${ACTOR_NAME}\`\n*Time:* ${UTC_TIME}"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Commit:* <${COMMIT_URL}|\`${SHORT_SHA}\`>\n*Message:* ${COMMIT_MSG}"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Workflow Run:* <${RUN_URL}|Open GitHub Actions run>"
                },
                "accessory": {
                  "type": "image",
                  "image_url": "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?auto=format&fit=crop&w=800&q=80",
                  "alt_text": "disco dancer"
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "Status: Stayin Alive"
                  }
                ]
              }
            ]
          }
          EOF

          curl -X POST -H "Content-type: application/json" --data @payload.json "$SLACK_WEBHOOK_URL"