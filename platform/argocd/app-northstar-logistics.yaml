apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: northstar-logistics
  namespace: argocd
spec:
  project: usreliance-verticals
  source:
    repoURL: https://github.com/bizranker/orchard-lab.git
    targetRevision: main
    path: platform/clients/northstar-logistics
  destination:
    server: https://kubernetes.default.svc
    namespace: northstar-logistics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
